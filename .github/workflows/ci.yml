name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  flutter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: flutter pub get
        run: flutter pub get

      # firebase_options.dart 와 google-services.json 은 secret 이라 CI 에 없음.
      # 이게 없어도 analyze / test 는 동작하지만, APK 빌드는 google-services 가 필요해서
      # 별도 secret 주입이 없는 환경에선 빌드 단계 skip.
      - name: Generate freezed / drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: dart format check
        run: dart format --set-exit-if-changed lib test

      - name: flutter test
        run: flutter test --reporter expanded

      # APK 빌드는 firebase 자격 증명이 있는 환경에서만.
      # GitHub Secrets 에 GOOGLE_SERVICES_JSON / FIREBASE_OPTIONS 추가 후 활성화.
